services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: taxi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taxi"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/taxi
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: super-secret-jwt-key
      JWT_ISSUER: bo-taxi
    ports:
      - "8081:8081"

  trip-service:
    build:
      context: .
      dockerfile: trip-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/taxi
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: super-secret-jwt-key
      JWT_ISSUER: bo-taxi
      FARE_PER_KM: 2.50
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      trip-service:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/taxi
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: super-secret-jwt-key
      JWT_ISSUER: bo-taxi
      WORKER_COUNT: 4
      WORKER_POLL_DELAY_MS: 1000
    ports:
      - "8083:8083"

volumes:
  postgres-data:
