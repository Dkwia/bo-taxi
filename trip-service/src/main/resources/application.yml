server:
  port: 8082

spring:
  application:
    name: trip-service
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taxi}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-production}
    jwt-issuer: ${JWT_ISSUER:bo-taxi}
  pricing:
    fare-per-km: ${FARE_PER_KM:2.50}
